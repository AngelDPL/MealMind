
services:

  - type: web

    name: mealmind-api

    runtime: python

    rootDir: backend

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn app:app

    envVars:

      - key: FLASK_ENV

        value: production

      - key: DATABASE_URL

        sync: false

      - key: JWT_SECRET_KEY

        sync: false

